name: over_the_bike_fit
description: "A new Flutter project for indoor bike fitting."
publish_to: 'none'

# 구글 콘솔 업로드 시 + 뒤의 숫자(빌드 번호)는 이전보다 항상 커야 합니다.
version: 1.0.1+1702

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.31.11
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  table_calendar: ^3.1.0
  flutter_native_splash: ^2.4.0  # 스플래시 화면을 위한 패키지

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 1. 앱 내에서 사용하는 모든 이미지 에셋 등록
  assets:
    - assets/background.png         # 네온 배경
    - assets/icon/bike_ui_dark.png  # 중앙 자전거 아이콘
    - assets/splash.png             # 스플래시용 이미지

# 2. 모바일 앱 시작 시 보여줄 스플래시 화면 설정
flutter_native_splash:
  color: "#000000"                  # 배경은 검은색
  background_image: "assets/background.png" # 배경 이미지
  image: "assets/splash.png"        # 중앙에 뜰 스플래시 이미지
  
  android_12:
    image: "assets/splash.png"
    icon_background_color: "#000000"
  
  fullscreen: true                  # 전체 화면 모드
