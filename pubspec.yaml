name: over_the_bike_fit
description: 실시간 심박수 기반 바이크 핏 애플리케이션
version: 1.0.1+1707

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_blue_plus: ^1.32.7
  permission_handler: ^11.3.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

# ==================== 스플래시 설정 (여기만 수정) ====================
flutter_native_splash:
  color: "#000000"
  image: "assets/splash/splash_screen.png"
  
  android_12:
    color: "#000000"
    image: "assets/splash/splash_screen.png"     # ← Android 12 이상 필수

  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/background.png
    - assets/icon/app_icon.png
    - assets/icon/heart.png
    - assets/icon/bike_ui_dark.png
    - assets/splash/splash_screen.png
