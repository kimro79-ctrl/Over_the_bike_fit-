name: over_the_bike_fit
description: "Indoor Bike Fit App"
publish_to: 'none'

# 구글 플레이 콘솔 에러를 해결하기 위한 새 버전 코드 1703
version: 1.0.1+1703

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  table_calendar: ^3.1.0
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # 실제 폴더 구조와 대소문자까지 정확히 일치시켰습니다.
  assets:
    - assets/background.png
    - assets/icon/bike_ui_dark.png
    - assets/splash/splash_screen.png

flutter_native_splash:
  color: "#000000"
  background_image: "assets/background.png"
  image: "assets/splash/splash_screen.png"
  android_12:
    image: "assets/splash/splash_screen.png"
    icon_background_color: "#000000"
  fullscreen: true
