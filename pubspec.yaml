name: over_the_bike_fit
description: 실시간 심박수 기반 바이크 핏 애플리케이션
version: 1.0.1+1707 # ✅ 콘솔 중복 방지를 위해 1707로 상향 권장
publish_to: "none"

environment:
  sdk: ">=3.5.0 <4.0.0" # ✅ 3.6.0 에러 방지를 위해 3.5.0으로 하향 조정

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_blue_plus: ^1.31.1
  permission_handler: ^11.3.0
  fl_chart: ^0.66.0      # ✅ 그래프 추가
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  table_calendar: ^3.1.2 # ✅ 달력 추가

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0 # ✅ 스플래쉬 추가

# 앱 아이콘 설정
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

# 스플래쉬 화면 설정
flutter_native_splash:
  color: "#000000"
  image: "assets/splash/splash_screen.png"
  android_12:
    image: "assets/splash/splash_screen.png"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/background.png
    - assets/icon/app_icon.png
    - assets/icon/heart.png
    - assets/icon/bike_ui_dark.png
    - assets/splash/splash_screen.png
