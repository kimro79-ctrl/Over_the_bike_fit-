name: BikeFit Final Victory (No Fallback)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (서명 설정 증발 방어)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 진짜 Keystore 복원 (SHA1: 75:CD...)
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 모바일 복사 시 발생하는 줄바꿈/공백 제거
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 💡 [방어] 키 파일이 없거나 0바이트면 빌드 즉시 중단
          if [ ! -s android/app/release.jks ]; then
            echo "❌ ERROR: Keystore secret is empty or corrupted!"
            exit 1
          fi

      - name: 🔧 Gradle 서명 설정 강제 주입
        # 💡 [핵심] flutter create로 날아간 build.gradle에 서명 로직을 다시 심습니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF
          
          # build.gradle 파일에 signingConfigs 로직 삽입
          FILE=android/app/build.gradle
          sed -i '1i def keystoreProperties = new Properties()\ndef keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }' $FILE
          
          # android { ... } 블록 내부에 서명 설정 추가
          python3 -c "
          import os
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: content = f.read()
          config = '''
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          '''
          if 'android {' in content:
              new_content = content.replace('android {', 'android {' + config, 1)
              with open(path, 'w') as f: f.write(new_content)
          "

      - name: 🚀 AAB 빌드 실행 (순정 Release 모드)
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 검증] SHA1 지문 확인
        # 💡 빌드된 결과물의 지문을 로그에 찍습니다. 75:CD...가 나오면 성공입니다!
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
