name: BikeFit Final Victory - SHA1 Verification

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 모바일 복사 시 발생하는 줄바꿈 등을 제거하고 복원합니다.
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          if [ ! -s android/app/release.jks ]; then
            echo "❌ Keystore 파일 복원 실패!"
            exit 1
          fi

      - name: 🕵️ [필독] 현재 사용 중인 키 지문 확인
        # 빌드 전, Secret에 넣은 키가 진짜 75:CD... 인지 로그에 출력합니다.
        run: |
          echo "검사 대상 별칭: fresh-upload-key"
          keytool -list -v -keystore android/app/release.jks \
            -alias fresh-upload-key \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA1 || echo "⚠️ 별칭 불일치 또는 키 오류"

      - name: 🔧 Gradle 서명 설정
