name: BikeFit Final Victory (Zero Fallback)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원 및 정밀 검증
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 💡 [중요] 공백과 줄바꿈을 제거하여 깨짐 방지
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks
          
          # 💡 [핵심] 파일이 0바이트거나 생성이 안 되면 빌드를 즉시 중단 (Fallback 방지)
          if [ ! -s android/app/release.jks ]; then
            echo "❌ ERROR: RELEASE_KEYSTORE Secret이 비어있거나 깨졌습니다!"
            exit 1
          fi

      - name: 🔧 서명 정보 주입
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: 🚀 AAB 빌드 실행 (Release 전용)
        # 💡 Flutter 기본 설정을 따르되, 릴리스 빌드임을 명시합니다.
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 빌드된 AAB 지문 최종 확인 (로그 확인용)
        # 💡 빌드 후 SHA1 지문을 로그에 찍어 사용자님이 직접 확인할 수 있게 합니다.
        run: |
          FILE_PATH=build/app/outputs/bundle/release/app-release.aab
          keytool -printcert -jarfile $FILE_PATH | grep SHA1 || echo "지문 확인 불가"

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
