name: BikeFit AAB Build - Asset & V2 Victory

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃 (에셋 포함)
        uses: actions/checkout@v4 

      - name: ☕ Java 및 Flutter 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1 

      - name: 🔢 빌드 번호 계산
        id: version_logic
        run: |
          BASE_CODE=1706
          NEW_CODE=$((BASE_CODE + ${{ github.run_number }}))
          echo "FINAL_VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV

      - name: 🧹 [클린 빌드] 패키지 로드
        run: |
          flutter clean
          flutter pub get 

      - name: 🎨 앱 아이콘 자동 생성 (Assets 참조)
        run: |
          # pubspec.yaml의 assets/icon/app_icon.png를 사용하여 아이콘 생성
          flutter pub run flutter_launcher_icons

      - name: 📝 Android 설정 적용 (v2 Embedding & 아이콘 고정)
        run: |
          # V1 관련 오류를 막기 위해 v2 설정을 강제로 박습니다.
          cat <<'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.overthebike.over_the_bike_fit">
              <uses-feature android:name="android.hardware.bluetooth_le" android:required="false" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" android:maxSdkVersion="28" />

              <application
                  android:label="Indoor bike fit"
                  android:name="${applicationName}"
                  android:icon="@mipmap/launcher_icon"
                  android:usesCleartextTraffic="true">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks 
          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF 

      - name: 📑 build.gradle 작성 (Java 17 버전 불일치 해결)
        run: |
          # jvmTarget 17 설정을 통해 컴파일 에러를 방지합니다.
          cat <<EOF_GRADLE > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          } 

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = project.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          } 

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35 

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              } 

              kotlinOptions {
                  jvmTarget = '17'
              } 

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode ${FINAL_VERSION_CODE}
                  versionName "1.0.1"
              } 

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              } 

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          } 

          flutter {
              source '../..'
          }
          EOF_GRADLE

      - name: 🏗️ AAB 빌드 실행 (flutter build appbundle)
        run: flutter build appbundle --release --no-tree-shake-icons 

      - name: 📦 최종 AAB 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_v${{ env.FINAL_VERSION_CODE }}_AAB
          path: build/app/outputs/bundle/release/app-release.aab
