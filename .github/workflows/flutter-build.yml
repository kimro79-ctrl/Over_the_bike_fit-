name: BikeFit PlayStore Release Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: Android 프로젝트 재생성
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n\r ' | base64 -d > android/app/release.jks
          echo "=== keystore 생성 확인 ==="
          ls -lh android/app

      - name: key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Keystore SHA1 확인
        run: |
          echo "=== KEYSTORE SHA1 ==="
          keytool -list -v \
          -keystore android/app/release.jks \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          -alias ${{ secrets.KEY_ALIAS }} | grep SHA1

      - name: AAB 빌드
        run: |
          flutter build appbundle --release --no-tree-shake-icons --build-number=1002

      - name: AAB SHA1 확인
        run: |
          echo "=== AAB SIGNATURE SHA1 ==="
          keytool -printcert \
          -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_AAB_Final
          path: build/app/outputs/bundle/release/app-release.aab
