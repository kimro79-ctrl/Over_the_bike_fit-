name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🐦 Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: 📦 Flutter 의존성 설치
        run: flutter pub get

      - name: 🔑 Keystore 복원
        run: |
          mkdir -p android/app
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: 🔍 Keystore SHA1 확인
        run: |
          keytool -list -v \
          -keystore android/app/release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: 🚀 Release AAB 빌드
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 AAB 서명 SHA1 확인
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab

      - name: 📦 AAB 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_AAB
          path: build/app/outputs/bundle/release/app-release.aab
