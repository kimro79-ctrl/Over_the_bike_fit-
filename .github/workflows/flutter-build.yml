name: BikeFit PlayStore Release - Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 줄바꿈과 공백을 제거하여 바이너리 손상 방지
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: ⚙️ Gradle 서명 설정 주입 (Python 방식 - 문법 오류 방지)
        # 쉘 스크립트의 따옴표 문제를 피하기 위해 Python을 사용합니다.
        run: |
          python3 -c "
          import os
          path = 'android/app/build.gradle'
          with open(path, 'r', encoding='utf-8') as f: lines = f.readlines()
          
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          \"\"\"
          
          with open(path, 'w', encoding='utf-8') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  if '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
          "

      - name: 🔍 [중요] Keystore 지문 확인
        # 별칭을 직접 명시하여 확인 과정을 거칩니다.
        run: |
          keytool -list -v \
            -keystore android/app/release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -alias ${{ secrets.KEY_ALIAS }} | grep SHA1

      - name: 🏗 AAB 빌드
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 빌드된 AAB 지문 대조
        # 최종 결과물의 지문이 75:CD...인지 확인합니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
