name: Flutter Android Release Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: 📥 Checkout
    uses: actions/checkout@v4

  - name: ☕ Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: 🐦 Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 3.27.1

  - name: 📦 Flutter pub get
    run: flutter pub get

  - name: 🔑 Restore keystore
    env:
      KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE }}
    run: |
      mkdir -p android/app
      echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks

  - name: 🧠 Create key.properties
    run: |
      cat <<EOF > android/key.properties
      storePassword=${{ secrets.KEYSTORE_PASSWORD }}
      keyPassword=${{ secrets.KEY_PASSWORD }}
      keyAlias=fresh-upload-key
      storeFile=app/release.jks
      EOF

  - name: 🔍 Verify Keystore
    run: |
      echo "====== KEYSTORE VERIFY ======"
      keytool -list -v \
      -keystore android/app/release.jks \
      -alias fresh-upload-key \
      -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA1
      echo "============================="

  - name: 🧹 Clean build
    run: flutter clean

  - name: 🏗 Build AAB
    run: flutter build appbundle --release

  - name: 🔍 Verify AAB Signature
    run: |
      echo "====== AAB SIGNATURE ======"
      keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
      echo "==========================="

  - name: 📦 Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: BikeFit-release-aab
      path: build/app/outputs/bundle/release/app-release.aab
