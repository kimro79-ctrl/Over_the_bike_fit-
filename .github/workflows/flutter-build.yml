name: BikeFit Final Stable Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🚀 Flutter 설정
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      # 🔥 핵심 수정 1: 캐시 완전 초기화
      - name: 🧨 Pub 캐시 제거
        run: rm -rf ~/.pub-cache

      # 🔥 핵심 수정 2: 정상적인 초기화
      - name: 🧹 Clean
        run: flutter clean

      - name: 📦 의존성 설치 (핵심)
        run: flutter pub get

      - name: 🔍 패키지 검증
        run: flutter pub deps

      # 🔢 버전 자동 증가
      - name: 🔢 빌드 번호 생성
        run: echo "FINAL_VERSION_CODE=$((1706 + $GITHUB_RUN_NUMBER))" >> $GITHUB_ENV

      # 🔑 Keystore 복원
      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | base64 --decode > android/app/release.jks

          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      # 🏗️ 빌드
      - name: 🏗️ AAB 빌드
        run: flutter build appbundle --release

      # 📦 업로드
      - name: 📦 AAB 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_v${{ env.FINAL_VERSION_CODE }}_AAB
          path: build/app/outputs/bundle/release/app-release.aab
