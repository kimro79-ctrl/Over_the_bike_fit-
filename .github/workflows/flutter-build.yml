name: BikeFit UI Fix - Victory Run (1706 Clean) 

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4 

      - name: ☕ Java 및 Flutter 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1 

      - name: 🧹 [초강력 클린] 캐시 삭제 및 v2 임베딩 강제 초기화
        run: |
          # 1. 이전 빌드 찌꺼기 완전 삭제
          flutter clean
          rm -rf android
          
          # 2. 최신 Flutter 버전 기반으로 Android 프로젝트 재생성 (v2 임베딩 자동 적용)
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get 

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks 

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF 

      - name: 🔍 [검증] SHA-1 지문 확인
        run: |
          keytool -list -v -keystore android/app/release.jks -alias fresh-upload-key -storepass Sodomaki80 -keypass Sodomaki80 | grep SHA1 

      - name: 📑 build.gradle 직접 작성 (버전 1706 적용)
        run: |
          # 파일을 새로 작성합니다. 마지막 EOF는 파일에 포함되지 않도록 주의합니다.
          cat <<'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          } 

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = project.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          } 

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35 

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              } 

              kotlinOptions {
                  jvmTarget = '17'
              } 

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode 1706
                  versionName "1.0.1"
              } 

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              } 

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          } 

          flutter {
              source '../..'
          }
          EOF

      - name: 🏗️ AAB 빌드 실행 (Clean UI 수정본)
        run: flutter build appbundle --release --no-tree-shake-icons 

      - name: 📦 수정된 AAB 파일 업로드 (1706)
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_1706_Victory_AAB
          path: build/app/outputs/bundle/release/app-release.aab 
