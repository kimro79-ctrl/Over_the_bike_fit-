name: BikeFit UI Fix - Victory Run (Auto Versioning)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4 

      - name: ☕ Java 및 Flutter 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1 

      - name: 🔢 빌드 번호 계산 (Base 1706 + Run Number)
        id: version_logic
        run: |
          # 기본 1706부터 시작해서 빌드 횟수를 더합니다.
          BASE_CODE=1706
          NEW_CODE=$((BASE_CODE + ${{ github.run_number }}))
          echo "FINAL_VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV
          echo "Generated Version Code: $NEW_CODE"

      - name: 🧹 [초강력 클린] 캐시 삭제 및 v2 임베딩 강제 초기화
        run: |
          flutter clean
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get 

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks 

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/app/key.properties
          storePassword=Sodomaki80
          keyPassword=Sodomaki80
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF 

      - name: 🔍 [검증] SHA-1 지문 확인
        run: |
          keytool -list -v -keystore android/app/release.jks -alias fresh-upload-key -storepass Sodomaki80 -keypass Sodomaki80 | grep SHA1 

      - name: 📑 build.gradle 직접 작성 (버전 자동 주입)
        run: |
          # env 변수를 쉘 스크립트 방식으로 안전하게 주입합니다.
          cat <<EOF_GRADLE > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          } 

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = project.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          } 

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35 

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              } 

              kotlinOptions {
                  jvmTarget = '17'
              } 

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode ${FINAL_VERSION_CODE}
                  versionName "1.0.1"
              } 

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              } 

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          } 

          flutter {
              source '../..'
          }
          EOF_GRADLE

      - name: 🏗️ AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons 

      - name: 📦 수정된 AAB 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_v${{ env.FINAL_VERSION_CODE }}_AAB
          path: build/app/outputs/bundle/release/app-release.aab
