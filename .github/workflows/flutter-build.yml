name: Brand New Key For Google

on:
  workflow_dispatch:

jobs:
  get_pem:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 완전히 새로운 업로드 키 생성
        run: |
          # 보안 정책상 중복을 피하기 위해 시각을 포함한 새 별칭 생성
          keytool -genkey -v -keystore final_upload_key.jks \
            -alias bikefit_final_$(date +%s) \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "password123" -keypass "password123" \
            -dname "CN=BikeFit, O=Dev, C=KR"

      - name: 📄 PEM 인증서 추출 및 직접 출력
        run: |
          # PEM 파일을 추출합니다.
          keytool -export -rfc -keystore final_upload_key.jks \
            -alias bikefit_final_* -file upload_certificate.pem -storepass "password123"
          
          echo "------------------------------------------------------"
          echo "⬇️ 아래 [PEM 내용] 전체를 복사해서 메모장에 .pem으로 저장하세요 ⬇️"
          echo "------------------------------------------------------"
          cat upload_certificate.pem
          echo "------------------------------------------------------"

      - name: 📦 GitHub Artifacts에 생파일 그대로 노출
        uses: actions/upload-artifact@v4
        with:
          name: upload_certificate_file # 폴더명처럼 생성됨
          path: upload_certificate.pem
          compression-level: 0 # 압축을 하지 않도록 설정
