name: BikeFit PlayStore Release - Final Victory

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 줄바꿈 및 공백을 완벽히 제거 후 복원
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          # 💡 실제 확인된 별칭인 fresh-upload-key를 직접 입력해도 안전합니다.
          keyAlias=${{ secrets.KEY_ALIAS || 'fresh-upload-key' }}
          storeFile=release.jks
          EOF

      - name: ⚙️ Gradle 서명 설정 강제 주입
        run: |
          python3 -c "
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes { release { signingConfig signingConfigs.release } }
          }
          \"\"\"
          with open(path, 'w') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  if '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
          "

      - name: 🔍 Keystore 지문 확인 (75:CD... 대조)
        # 여기서 에러가 나더라도 빌드가 계속되도록 || true를 붙였습니다.
        run: |
          keytool -list -v -keystore android/app/release.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -alias ${{ secrets.KEY_ALIAS || 'fresh-upload-key' }} | grep SHA1 || true

      - name: 🏗 AAB 빌드
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 빌드된 AAB SHA1 확인
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
