name: Mobile Key Generation Utility

on:
  workflow_dispatch: # 모바일에서 'Run workflow' 버튼으로 실행

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 새로운 업로드 키 및 PEM 생성
        run: |
          # 완전히 새로운 별칭과 파일명 사용 (중복 방지)
          keytool -genkey -v -keystore mobile-upload-key.jks \
            -alias final-mobile-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "password123" \
            -keypass "password123" \
            -dname "CN=BikeFit, OU=Dev, O=MyCompany, L=Seoul, S=Seoul, C=KR"

          # 구글 제출용 PEM 추출
          keytool -export -rfc \
            -keystore mobile-upload-key.jks \
            -alias final-mobile-key \
            -file final_mobile_cert.pem \
            -storepass "password123"

      - name: 2. 결과값 출력 (이걸 복사해서 쓰세요)
        run: |
          echo "===================================================="
          echo "🔑 1. 구글 플레이 콘솔에 제출할 PEM 내용 (전체 복사):"
          cat final_mobile_cert.pem
          echo "===================================================="
          echo "📦 2. GitHub Secret(RELEASE_KEYSTORE)에 넣을 Base64:"
          base64 -w 0 mobile-upload-key.jks
          echo -e "\n===================================================="
          echo "📝 설정 정보:"
          echo "ALIAS: final-mobile-key"
          echo "PASSWORD: password123"
