name: BikeFit UI Fix - Victory Run (1706 Final)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 및 Flutter 설정 (최신 버전)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0' 
          channel: 'stable'

      - name: 🧹 Flutter Clean
        run: flutter clean

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🛠️ Android v1 Embedding 제거 (에러 해결 핵심)
        run: |
          # AndroidManifest.xml에서 구식 flutterEmbedding 관련 메타데이터 삭제
          sed -i '/android:name="io.flutter.app.android.MetaDataValueHolder"/d' android/app/src/main/AndroidManifest.xml
          sed -i '/android:name="flutterEmbedding"/d' android/app/src/main/AndroidManifest.xml

      - name: 📄 build.gradle 직접 작성 (버전 1706 고정)
        run: |
          cat <<'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = project.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode 1706
                  versionName "1.0.1"
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

      - name: 🏗️ AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 📦 수정된 AAB 파일 업로드 (1706)
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_1706_Final
          path: build/app/outputs/bundle/release/app-release.aab
