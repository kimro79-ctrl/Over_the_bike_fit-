name: BikeFit Final Victory Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 및 Flutter 설정 (3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: 🐦 Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 💡 줄바꿈 제거 후 정확히 파일 생성
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🚀 AAB 빌드 실행 (서명 강제 주입)
        # 💡 [핵심 수정] key.properties에 의존하지 않고 명령어로 직접 서명을 박습니다.
        run: |
          flutter build appbundle --release \
            --signing-key-alias=fresh-upload-key \
            --signing-key-password=${{ secrets.KEY_PASSWORD }} \
            --signing-store-password=${{ secrets.KEYSTORE_PASSWORD }} \
            --signing-store-path=android/app/release.jks \
            --no-tree-shake-icons

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
