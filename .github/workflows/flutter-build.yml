name: BikeFit Final Stable Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: 🔄 Android 프로젝트 재생성 (V2 강제)
        run: |
          rm -rf android
          flutter create . --platforms=android --org com.overthebike

      - name: 📦 패키지 설치
        run: flutter pub get

      - name: 🔑 Keystore 복원
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/release.jks

      - name: 🔧 key.properties 생성
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: 🚀 AAB 빌드
        run: flutter build appbundle --release

      - name: 📦 AAB 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
