name: BikeFit Final Victory - Full Verification

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 및 Flutter 설정 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (V2 강제 및 클린)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 key.properties 생성 (사용자 정답 경로 적용)
        # android/app/ 기준으로 해석되므로 release.jks가 맞습니다.
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF

      - name: 🔍 [선행 검증] 빌드 전 SHA1 확인
        # 여기서 75:CD...가 나오는지 1초 만에 확인합니다.
        run: |
          echo "=================================================="
          echo "목표(Google): 75:CD:32:95:21:A1:35:86:C6:33:E7:ED:4E:F6:87:37:E2:D9:FD:3D"
          echo -n "복원된 키 지문: "
          keytool -list -v -keystore android/app/release.jks -alias fresh-upload-key -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA1
          echo "=================================================="

      - name: 📑 [결정적 단계] build.gradle 직접 작성 (Java 17 대응)
        run: |
          cat <<'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.overthebike.over_the_bike_fit"
              compileSdk 35

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.overthebike.over_the_bike_fit"
                  minSdk 21
                  targetSdk 35
                  versionCode 1700
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

      - name: 🏗 AAB 빌드 실행 (이미 검증된 설정 사용)
        run: flutter build appbundle --release --no-tree-shake-icons
          
      - name: 🔍 [최종 확인] 결과물 SHA1 지문 대조
        # 빌드된 AAB 파일의 지문을 추출하여 최종 확인합니다.
        run: |
          echo "=================================================="
          echo "최종 생성된 AAB 지문 확인:"
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1
          echo "=================================================="

      - name: 📦 승리의 AAB 파일 업로드
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Verified_AAB
          path: build/app/outputs/bundle/release/app-release.aab
