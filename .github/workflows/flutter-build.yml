name: BikeFit Final Victory - The Perfect Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ 환경 설정 (Java 17 / Flutter 3.27.1)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1

      - name: 🏗️ 프로젝트 초기화 (Android 리셋)
        run: |
          rm -rf android
          flutter create . --platforms android --org com.overthebike --project-name over_the_bike_fit
          flutter pub get

      - name: 🔑 Keystore 복원
        env:
          KEY_DATA: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p android/app
          # 줄바꿈 제거 후 정확하게 복원
          echo "$KEY_DATA" | tr -d '\n ' | base64 --decode > android/app/release.jks

      - name: 🔧 Gradle 서명 설정 주입 (오류 수정본)
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=fresh-upload-key
          storeFile=release.jks
          EOF
          
          python3 -c "
          import sys
          path = 'android/app/build.gradle'
          with open(path, 'r') as f: lines = f.readlines()
          
          signing_code = \"\"\"
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          \"\"\"
          
          with open(path, 'w') as f:
              inserted = False
              for line in lines:
                  f.write(line)
                  # plugins 블록이 닫히는 지점 뒤에 안전하게 삽입
                  if '}' in line and not inserted:
                      f.write(signing_code)
                      inserted = True
          "

      - name: 🚀 AAB 빌드 실행
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: 🔍 [최종 확인] SHA1 지문 대조
        # 결과물 지문이 75:CD... 인지 확인합니다.
        run: |
          keytool -printcert -jarfile build/app/outputs/bundle/release/app-release.aab | grep SHA1

      - name: 📦 최종 AAB 추출
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit_Final_AAB
          path: build/app/outputs/bundle/release/app-release.aab
