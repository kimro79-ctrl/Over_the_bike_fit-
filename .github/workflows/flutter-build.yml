name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Restore release keystore
        run: |
          # android/app 디렉토리를 생성하고 제공된 jks 파일을 복원합니다.
          mkdir -p android/app
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.jks

      - name: Verify keystore file
        run: |
          echo "Checking restored keystore file..."
          ls -lh android/app/release.jks
          # 파일 크기가 0이면 시크릿 설정 오류로 간주하고 중단합니다.
          if [ ! -s android/app/release.jks ]; then
            echo "ERROR: release.jks is empty. Please check your GitHub Secret: RELEASE_KEYSTORE"
            exit 1
          fi

      - name: Create key.properties
        run: |
          # 실제 빌드 시 참조할 키 정보를 생성합니다.
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Print keystore SHA1 (Check)
        run: |
          # 파일이 유효한지 keytool로 확인합니다.
          keytool -list -v \
          -keystore android/app/release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" | grep SHA1 || echo "Check password or alias"

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab

