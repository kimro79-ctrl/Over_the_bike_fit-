name: BikeFit Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.1
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify keystore file
        run: |
          echo "Checking keystore file in repository..."
          # 직접 업로드하신 android/app/release.jks 파일을 확인합니다.
          ls -la android/app/release.jks
          if [ ! -f android/app/release.jks ]; then
            echo "ERROR: release.jks not found in android/app/"
            exit 1
          fi

      - name: Create key.properties
        run: |
          # 리포지토리의 jks 파일을 사용하여 빌드하도록 설정 파일을 생성합니다.
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Clean and Build AAB
        run: |
          # 이전 빌드 기록을 지우고 깔끔하게 릴리스 빌드를 시작합니다.
          flutter clean
          flutter pub get
          flutter build appbundle --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BikeFit-AAB
          path: build/app/outputs/bundle/release/app-release.aab
