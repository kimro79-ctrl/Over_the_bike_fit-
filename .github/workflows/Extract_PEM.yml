name: Brand New Key For Google

on:
  workflow_dispatch:

jobs:
  get_pem:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 완전히 새로운 업로드 키 생성
        run: |
          # 별칭을 bikefitkey2026으로 고정하여 인식 오류 방지
          keytool -genkey -v -keystore final_upload_key.jks \
            -alias bikefitkey2026 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "password123" -keypass "password123" \
            -dname "CN=BikeFit, O=Dev, C=KR"

      - name: 📄 PEM 인증서 추출 및 직접 출력
        run: |
          # 고정된 별칭으로 인증서 추출
          keytool -export -rfc -keystore final_upload_key.jks \
            -alias bikefitkey2026 -file upload_certificate.pem -storepass "password123"
          
          echo "------------------------------------------------------"
          echo "⬇️ 아래 내용을 전체 복사해서 구글 플레이 콘솔에 제출하세요 ⬇️"
          echo "------------------------------------------------------"
          cat upload_certificate.pem
          echo "------------------------------------------------------"

      - name: 📤 PEM 파일 단독 업로드 (압축 해제 불필요)
        uses: actions/upload-artifact@v4
        with:
          name: upload_certificate.pem # 결과물 이름을 .pem으로 명시
          path: upload_certificate.pem
          compression-level: 0 # 압축 끄기
